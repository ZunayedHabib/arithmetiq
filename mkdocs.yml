site_name: ArithmetiQ
site_description: Free mathematics tutoring for students — step-by-step, from scratch.
site_url: https://arithmetiq.github.io/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/math-compass

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - NCTB General Math 9-10:
      - Overview: nctb-general-math-9-10/index.md
      - Chapter 1 — Real Numbers:
          - Overview: nctb-general-math-9-10/chapter-1-real-numbers/index.md
          - Exercise 1.1: nctb-general-math-9-10/chapter-1-real-numbers/exercise-1-1.md
  - NCTB Higher Math 9-10:
      - Overview: nctb-higher-math-9-10/index.md
  - Edexcel P1:
      - Overview: edexcel-p1/index.md
  - Edexcel P2:
      - Overview: edexcel-p2/index.md
